name: release

# One automated build on the latest macOS: cross-build the whole 10.9 product
# (x86_64 @ 10.9 userland + a real MT2Gesture.kext built against a fetched
# MacOSX10.9 SDK), gate it, package it, and publish a GitHub Release on v* tags.
#
# AUTHENTICITY / CORRECTNESS of the cross-built kext rests on two things, no old
# Xcode required:
#   1. the SDK is pinned by SHA-256 in cmake/fetch_10_9_sdk.sh (integrity), and
#   2. the equivalence gate (cmake/characterize_build.sh compare) proves the
#      cross-built kext is identical -- in undefined+defined external symbol sets,
#      KPI deps, and arch -- to the trusted native 10.9.5 build committed in
#      dist/characterization/. A swapped/tampered SDK yields a different kext and
#      fails this gate.
#
# RELEASE INVARIANT: the single `publish` job is the ONLY thing that writes to
# GitHub Releases and it `needs` the build job, so any build/gate failure skips
# publishing entirely -- never a partial release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:        # manual runs produce an artifact, not a release

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Determine version (from CMake MT2_VERSION — single source of truth)
        id: ver
        run: |
          VER=$(grep -m1 'set(MT2_VERSION' CMakeLists.txt | sed -E 's/.*"([^"]+)".*/\1/')
          [ -n "$VER" ] || { echo "::error::could not read MT2_VERSION from CMakeLists.txt"; exit 1; }
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          # On a tag build, enforce that the tag matches the CMake version so the
          # release name and the pkg version can never drift.
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ "${GITHUB_REF_NAME}" != "v$VER" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != v$VER (CMakeLists MT2_VERSION); keep them in sync"
            exit 1
          fi

      - name: Ensure Rosetta (x86_64 @ 10.9 tests run under it)
        run: softwareupdate --install-rosetta --agree-to-license || true

      # Persist the fetched SDK across runs so releases don't depend on the phracker
      # archive being up every time. Key is tied to the fetch script (URL + pinned
      # SHA-256 live there), so bumping the SDK auto-invalidates the cache.
      - name: Cache the MacOSX10.9 SDK
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.mt2-sdk-cache
          key: macosx10.9-sdk-${{ hashFiles('cmake/fetch_10_9_sdk.sh') }}

      - name: Fetch + checksum-verify the MacOSX10.9 SDK
        id: sdk
        env:
          MT2_SDK_CACHE: ${{ github.workspace }}/.mt2-sdk-cache
        run: echo "path=$(sh cmake/fetch_10_9_sdk.sh)" >> "$GITHUB_OUTPUT"

      # Sparkle 1.27.3 (prebuilt, x86_64-thinned) for MavericksTrackpad2Updater.app. Cache keyed on
      # the fetch script (URL + pinned SHA live there), so bumping Sparkle auto-invalidates the cache.
      - name: Cache the Sparkle framework
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.mt2-sparkle-cache
          key: sparkle-1.27.3-${{ hashFiles('cmake/fetch_sparkle.sh') }}

      - name: Fetch + checksum-verify + thin Sparkle 1.27.3
        id: sparkle
        env:
          MT2_SPARKLE_CACHE: ${{ github.workspace }}/.mt2-sparkle-cache
        run: echo "path=$(sh cmake/fetch_sparkle.sh)" >> "$GITHUB_OUTPUT"

      - name: Configure + build (x86_64 @ 10.9 userland + kext + updater)
        run: |
          cmake -S . -B build -DMT2_MACOSX_10_9_SDK="${{ steps.sdk.outputs.path }}" -DMT2_SPARKLE_FRAMEWORK="${{ steps.sparkle.outputs.path }}"
          cmake --build build
          echo "userland slice:"; lipo -info build/sbin/mt2_reenumerate
          echo "kext:"; file build/MT2Gesture.kext/Contents/MacOS/MT2Gesture

      - name: 10.9 userland compat guard (no post-10.9 imports)
        run: sh cmake/compat_guard.sh build

      - name: Kext cross-build equivalence gate (vs native 10.9 reference, fail-closed)
        run: sh cmake/characterize_build.sh compare dist/characterization build

      - name: Unit tests (Rosetta)
        # Exclude test_re_bats: the `re` toolkit suite reverse-engineers 10.9 system
        # frameworks (MultitouchSupport / MTDeviceCreateListForDriverType, symbolicated
        # framework binaries) that don't exist on the macos-26 runner. It runs on the
        # 10.9 dev box; here we validate the cross-built product's logic + portable tooling.
        run: ctest --test-dir build --output-on-failure -E '^test_re_bats$'

      - name: Build .pkg (10.9.5 install floor)
        run: |
          cmake --build build --target pkg   # version derives from CMake MT2_VERSION
          echo "floor check:"; pkgutil --expand "build/mt2d-${{ steps.ver.outputs.version }}.pkg" /tmp/pkgx
          grep -o 'os-version min="[0-9.]*"' /tmp/pkgx/Distribution

      - name: Emit machine-readable feed
        run: |
          VER="${{ steps.ver.outputs.version }}"
          cat > build/latest.json <<EOF
          {
            "version": "$VER",
            "min_os": "10.9.5",
            "pkg": "mt2d-$VER.pkg",
            "url": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/mt2d-$VER.pkg"
          }
          EOF
          cat build/latest.json

      - name: Upload build artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: mt2d-pkg
          path: |
            build/mt2d-${{ steps.ver.outputs.version }}.pkg
            build/latest.json

  # All-or-nothing publish: the ONLY job that writes to GitHub Releases, gated on a
  # successful build. A forgotten `needs` entry is the classic way to ship a partial
  # release -- keep this list complete as build jobs are added.
  publish:
    needs: [build-macos]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          # Pre-release if the tag has a -suffix OR is a v0.x (pre-1.0, unstable by
          # semver convention). A clean v1.0.0+ -> full release. So v0.1.0 ships as a
          # prerelease now; the eventual v1.0.0 (after the 10.9.5 load-test) is a real
          # release automatically -- no manual toggling.
          prerelease: ${{ contains(github.ref_name, '-') || startsWith(github.ref_name, 'v0.') }}
          files: |
            dist/mt2d-*.pkg
            dist/latest.json
